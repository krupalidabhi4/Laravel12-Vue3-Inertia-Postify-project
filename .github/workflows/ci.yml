name: Postify CI workflow

on:
  push:

jobs:
  build-and-push: # Job Name
    runs-on: ubuntu-latest #Github Runner (Free)
    steps: # actions perform steps
      - name: Checkout code
        uses: actions/checkout@v4 # Clone the code into a ubuntu runner

      - name: Login to Docker Hub  # To authenticate in docker for build and push image in docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker
        uses: docker/setup-buildx-action@v4

      - name: Build and push - Push docker image to docker hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/postify-backend:mitesh



